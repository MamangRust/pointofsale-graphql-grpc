syntax = "proto3";

package pb;

import "api.proto";
import "google/protobuf/wrappers.proto";
import "google/protobuf/empty.proto";

option go_package = "github.com/MamangRust/pointofsale-graphql-grpc/internal/pb";

message FindMonthlyTransactionStatus {
  int32 year = 1;
  int32 month = 2;
}

message FindYearlyTransactionStatus {
  int32 year = 1;
  int32 month = 2;
}

message FindMonthlyTransactionStatusByMerchant {
  int32 year = 1;
  int32 month = 2;
  int32 merchant_id = 3;
}

message FindYearlyTransactionStatusByMerchant {
  int32 year = 1;
  int32 merchant_id = 2;
}

message YearTransactionMethod { int32 year = 1; }

message MonthTransactionMethod {
  int32 year = 1;
  int32 month = 2;
}

message MonthTransactionMethodByMerchant {
  int32 merchant_id = 1;
  int32 year = 2;
  int32 month = 3;
}

message YearTransactionMethodByMerchant {
  int32 merchant_id = 1;
  int32 year = 2;
}

message TransactionMonthlyAmountSuccess {
  string year = 1;
  string month = 2;
  int32 total_success = 3;
  int32 total_amount = 4;
}

message TransactionMonthlyAmountFailed {
  string year = 1;
  string month = 2;
  int32 total_failed = 3;
  int32 total_amount = 4;
}

message TransactionYearlyAmountSuccess {
  string year = 1;
  int32 total_success = 2;
  int32 total_amount = 3;
}

message TransactionYearlyAmountFailed {
  string year = 1;
  int32 total_failed = 2;
  int32 total_amount = 3;
}

message TransactionMonthlyMethod {
  string month = 1;
  string payment_method = 2;
  int32 total_transactions = 3;
  int32 total_amount = 4;
}

message TransactionYearlyMethod {
  string year = 1;
  string payment_method = 2;
  int32 total_transactions = 3;
  int32 total_amount = 4;
}

message ApiResponseTransactionMonthAmountSuccess {
  string status = 1;
  string message = 2;
  repeated TransactionMonthlyAmountSuccess data = 3;
}

message ApiResponseTransactionYearAmountSuccess {
  string status = 1;
  string message = 2;
  repeated TransactionYearlyAmountSuccess data = 3;
}

message ApiResponseTransactionMonthAmountFailed {
  string status = 1;
  string message = 2;
  repeated TransactionMonthlyAmountFailed data = 3;
}

message ApiResponseTransactionYearAmountFailed {
  string status = 1;
  string message = 2;
  repeated TransactionYearlyAmountFailed data = 3;
}

message ApiResponseTransactionMonthPaymentMethod {
  string status = 1;
  string message = 2;
  repeated TransactionMonthlyMethod data = 3;
}

message ApiResponseTransactionYearPaymentmethod {
  string status = 1;
  string message = 2;
  repeated TransactionYearlyMethod data = 3;
}

message ApiResponsesTransaction {
  string status = 1;
  string message = 2;
  repeated TransactionResponse data = 3;
}

service TransactionService {

  rpc FindMonthStatusSuccess(FindMonthlyTransactionStatus)
      returns (ApiResponseTransactionMonthAmountSuccess);
  rpc FindYearStatusSuccess(FindYearlyTransactionStatus)
      returns (ApiResponseTransactionYearAmountSuccess);

  rpc FindMonthStatusFailed(FindMonthlyTransactionStatus)
      returns (ApiResponseTransactionMonthAmountFailed);
  rpc FindYearStatusFailed(FindYearlyTransactionStatus)
      returns (ApiResponseTransactionYearAmountFailed);

  rpc FindMonthStatusSuccessByMerchant(FindMonthlyTransactionStatusByMerchant)
      returns (ApiResponseTransactionMonthAmountSuccess);
  rpc FindYearStatusSuccessByMerchant(FindYearlyTransactionStatusByMerchant)
      returns (ApiResponseTransactionYearAmountSuccess);

  rpc FindMonthStatusFailedByMerchant(FindMonthlyTransactionStatusByMerchant)
      returns (ApiResponseTransactionMonthAmountFailed);
  rpc FindYearStatusFailedByMerchant(FindYearlyTransactionStatusByMerchant)
      returns (ApiResponseTransactionYearAmountFailed);

  rpc FindMonthMethodSuccess(MonthTransactionMethod)
      returns (ApiResponseTransactionMonthPaymentMethod);
  rpc FindYearMethodSuccess(YearTransactionMethod)
      returns (ApiResponseTransactionYearPaymentmethod);

  rpc FindMonthMethodByMerchantSuccess(MonthTransactionMethodByMerchant)
      returns (ApiResponseTransactionMonthPaymentMethod);
  rpc FindYearMethodByMerchantSuccess(YearTransactionMethodByMerchant)
      returns (ApiResponseTransactionYearPaymentmethod);

  rpc FindMonthMethodFailed(MonthTransactionMethod)
      returns (ApiResponseTransactionMonthPaymentMethod);
  rpc FindYearMethodFailed(YearTransactionMethod)
      returns (ApiResponseTransactionYearPaymentmethod);

  rpc FindMonthMethodByMerchantFailed(MonthTransactionMethodByMerchant)
      returns (ApiResponseTransactionMonthPaymentMethod);
  rpc FindYearMethodByMerchantFailed(YearTransactionMethodByMerchant)
      returns (ApiResponseTransactionYearPaymentmethod);
}
