syntax = "proto3";

package pb;

import "api.proto";
import "google/protobuf/wrappers.proto";
import "google/protobuf/empty.proto";

option go_package = "github.com/MamangRust/pointofsale-graphql-grpc/internal/pb";

message FindAllOrderRequest {
  int32 page = 1;
  int32 page_size = 2;
  string search = 3;
}

message FindAllOrderMerchantRequest {
  int32 page = 1;
  int32 page_size = 2;
  string search = 3;
  int32 merchant_id = 4;
}

message FindByIdOrderRequest { int32 id = 1; }

message FindYearOrder { int32 year = 1; }

message FindYearOrderByMerchant {
  int32 merchant_id = 1;
  int32 year = 2;
}

message FindYearMonthTotalRevenue {
  int32 year = 1;
  int32 month = 2;
}

message FindYearTotalRevenue { int32 year = 1; }

message FindYearMonthTotalRevenueById {
  int32 year = 1;
  int32 month = 2;
  int32 order_id = 3;
}

message FindYearTotalRevenueById {
  int32 year = 1;
  int32 order_id = 2;
}

message FindYearMonthTotalRevenueByMerchant {
  int32 year = 1;
  int32 month = 2;
  int32 merchant_id = 3;
}

message FindYearTotalRevenueByMerchant {
  int32 year = 1;
  int32 merchant_id = 2;
}

message OrderMonthlyResponse {
  string month = 1;
  int32 order_count = 2;
  int32 total_revenue = 3;
  int32 total_items_sold = 4;
}

message OrderYearlyResponse {
  string year = 1;
  int32 order_count = 2;
  int32 total_revenue = 3;
  int32 total_items_sold = 4;
  int32 active_cashiers = 5;
  int32 unique_products_sold = 6;
}

message OrderMonthlyTotalRevenueResponse {
  string year = 1;
  string month = 2;
  int32 order_count = 3;
  int32 total_revenue = 4;
  int32 total_items_sold = 5;
}

message OrderYearlyTotalRevenueResponse {
  string year = 1;
  int32 order_count = 2;
  int32 total_revenue = 3;
  int32 total_items_sold = 4;
  int32 active_cashiers = 5;
  int32 unique_products_sold = 6;
}

message ApiResponseOrderMonthly {
  string status = 1;
  string message = 2;
  repeated OrderMonthlyResponse data = 3;
}

message ApiResponseOrderYearly {
  string status = 1;
  string message = 2;
  repeated OrderYearlyResponse data = 3;
}

message ApiResponsesOrder {
  string status = 1;
  string message = 2;
  repeated OrderResponse data = 3;
}

message ApiResponseOrderMonthlyTotalRevenue {
  string status = 1;
  string message = 2;
  repeated OrderMonthlyTotalRevenueResponse data = 3;
}

message ApiResponseOrderYearlyTotalRevenue {
  string status = 1;
  string message = 2;
  repeated OrderYearlyTotalRevenueResponse data = 3;
}

service OrderService {
  rpc FindMonthlyTotalRevenue(FindYearMonthTotalRevenue)
      returns (ApiResponseOrderMonthlyTotalRevenue) {}
  rpc FindYearlyTotalRevenue(FindYearTotalRevenue)
      returns (ApiResponseOrderYearlyTotalRevenue) {}

  rpc FindMonthlyTotalRevenueById(FindYearMonthTotalRevenueById)
      returns (ApiResponseOrderMonthlyTotalRevenue) {}
  rpc FindYearlyTotalRevenueById(FindYearTotalRevenueById)
      returns (ApiResponseOrderYearlyTotalRevenue) {}

  rpc FindMonthlyTotalRevenueByMerchant(FindYearMonthTotalRevenueByMerchant)
      returns (ApiResponseOrderMonthlyTotalRevenue) {}
  rpc FindYearlyTotalRevenueByMerchant(FindYearTotalRevenueByMerchant)
      returns (ApiResponseOrderYearlyTotalRevenue) {}

  rpc FindAll(FindAllOrderRequest) returns (ApiResponsePaginationOrder);
  rpc FindByMerchant(FindAllOrderMerchantRequest)
      returns (ApiResponsePaginationOrder);

  rpc FindById(FindByIdOrderRequest) returns (ApiResponseOrder);

  rpc FindMonthlyRevenue(FindYearOrder) returns (ApiResponseOrderMonthly);
  rpc FindYearlyRevenue(FindYearOrder) returns (ApiResponseOrderYearly);

  rpc FindMonthlyRevenueByMerchant(FindYearOrderByMerchant)
      returns (ApiResponseOrderMonthly);
  rpc FindYearlyRevenueByMerchant(FindYearOrderByMerchant)
      returns (ApiResponseOrderYearly);

  rpc FindByActive(FindAllOrderRequest)
      returns (ApiResponsePaginationOrderDeleteAt) {}
  rpc FindByTrashed(FindAllOrderRequest)
      returns (ApiResponsePaginationOrderDeleteAt) {}

  rpc Create(CreateOrderRequest) returns (ApiResponseOrder);
  rpc Update(UpdateOrderRequest) returns (ApiResponseOrder);
  rpc TrashedOrder(FindByIdOrderRequest) returns (ApiResponseOrderDeleteAt);
  rpc RestoreOrder(FindByIdOrderRequest) returns (ApiResponseOrderDeleteAt);
  rpc DeleteOrderPermanent(FindByIdOrderRequest)
      returns (ApiResponseOrderDelete);

  rpc RestoreAllOrder(google.protobuf.Empty) returns (ApiResponseOrderAll) {}
  rpc DeleteAllOrderPermanent(google.protobuf.Empty)
      returns (ApiResponseOrderAll) {}
}